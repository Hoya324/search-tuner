spring:
  application:
    name: search-tuner

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/search_tuner?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:tuner}
    password: ${SPRING_DATASOURCE_PASSWORD:tuner123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:disabled}

es:
  host: ${ES_HOST:localhost}
  port: ${ES_PORT:9200}
  synonyms:
    path: ${ES_SYNONYMS_PATH:./docker/elasticsearch/config/synonyms/product_synonyms.txt}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://v0-kst.vercel.app}

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    com.kst.searchtuner: INFO
    org.springframework.ai: WARN
