services:
  mysql:
    image: mysql:8.0
    container_name: search-tuner-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: search_tuner
      MYSQL_USER: tuner
      MYSQL_PASSWORD: tuner123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    build:
      context: ./docker/elasticsearch
      dockerfile: Dockerfile
    container_name: search-tuner-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
      - ./docker/elasticsearch/config/synonyms:/usr/share/elasticsearch/config/synonyms
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10

  kibana:
    image: kibana:8.17.0
    container_name: search-tuner-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"]
      interval: 15s
      timeout: 10s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: search-tuner-app
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/search_tuner?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: tuner
      SPRING_DATASOURCE_PASSWORD: tuner123
      ES_HOST: elasticsearch
      ES_PORT: "9200"
      JPA_DDL_AUTO: update
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./search-tuner-frontend
      dockerfile: Dockerfile
    container_name: search-tuner-frontend
    environment:
      BACKEND_URL: http://app:8080
    ports:
      - "3000:3000"
    depends_on:
      app:
        condition: service_healthy
    restart: on-failure

volumes:
  mysql_data:
  es_data:
