services:
  mysql:
    image: mysql:8.0
    container_name: search-tuner-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: search_tuner
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: public.ecr.aws/j8w6n7e6/kst-es:latest
    container_name: search-tuner-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
      - ./elasticsearch/config/synonyms:/usr/share/elasticsearch/config/synonyms
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10

  app:
    container_name: search-tuner-app
    image: ${ECR_REPO}:${IMAGE_TAG}
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/search_tuner?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      ES_HOST: elasticsearch
      ES_PORT: "9200"
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY is required}
      JPA_DDL_AUTO: validate
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://v0-kst.vercel.app,https://search.git-tree.com}
    volumes:
      - ./logs:/logs
    networks:
      - internal
      - outside-weather
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

networks:
  internal:
    driver: bridge
    name: search-tuner-internal
  outside-weather:
    external: true
    name: outside-weather-production

volumes:
  mysql_data:
    name: search-tuner-mysql-data
  es_data:
    name: search-tuner-es-data
